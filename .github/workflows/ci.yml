# ---------------------------------------------------------------------------
# CI workflow for the NYC Taxi medallion pipeline.
#
# Runs on every push and on pull requests targeting main:
#   1. Boots Python 3.11 and a Temurin JDK 17 (PySpark needs a JVM).
#   2. Caches pip downloads keyed on requirements.txt for faster reruns.
#   3. Installs PySpark, Delta, pytest, and ruff at pinned versions so
#      the CI environment matches what tests are written against.
#   4. Runs `ruff check` as a soft lint gate (continue-on-error while we
#      bring the codebase up to standard) and then `pytest` against the
#      Silver transformation unit tests in tests/.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.5.3 delta-spark==3.2.0 pytest==8.3.0 ruff==0.6.0

      - name: Lint with ruff
        continue-on-error: true
        run: ruff check src/ tests/

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest tests/ -v
